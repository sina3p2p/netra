# Netra small — ~280M params · hyperparameter tuning (days on 1 GPU)
# Usage: torchrun --nproc_per_node=4 train.py --config configs/small.yaml

model:
  d_model: 640
  n_layers: 12
  n_heads: 10
  d_head: 64
  d_kv_latent: 448
  d_q_latent: 640
  d_rope: 32
  ffn_hidden: 1792
  max_seq_len: 2048
  n_experts: 6
  n_active_experts: 2
  has_shared_expert: true

training:
  batch_size: 16
  grad_accum_steps: 4
  max_lr: 3.0e-4
  min_lr_ratio: 0.1
  warmup_steps: 1700
  max_steps: 51000

eval:
  eval_interval: 500
  eval_steps: 20
  generate_interval: 500

logging:
  log_interval: 10
  save_interval: 1000
