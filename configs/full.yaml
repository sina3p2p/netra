# Netra full — ~2B+ params · full-scale training run
# Usage: torchrun --nproc_per_node=8 train.py --config configs/full.yaml

model:
  d_model: 768
  n_layers: 24
  n_heads: 12
  d_head: 64
  d_kv_latent: 512
  d_q_latent: 768
  d_rope: 32
  ffn_hidden: 2048
  max_seq_len: 2048
  n_experts: 8
  n_active_experts: 2
  has_shared_expert: true

training:
  batch_size: 8
  grad_accum_steps: 8
  max_lr: 2.0e-4
  min_lr_ratio: 0.1
  warmup_steps: 2800
  max_steps: 310000

eval:
  eval_interval: 500
  eval_steps: 20
  generate_interval: 500

logging:
  log_interval: 10
  save_interval: 2000
